# ===================================
# StayEase Backend Configuration
# ===================================

# Server Configuration
server.port=${PORT:8080}

# ===================================
# Database Configuration (MySQL)
# ===================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/stayease_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:170803}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA/Hibernate Configuration
# ===================================
spring.jpa.hibernate.ddl-auto= update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================
# JWT Configuration
# ===================================
jwt.secret=${JWT_SECRET:stayease-secret-key-for-jwt-token-generation-min-256-bits-required}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===================================
# File Upload Configuration
# ===================================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=200MB
file.upload-dir=./uploads

